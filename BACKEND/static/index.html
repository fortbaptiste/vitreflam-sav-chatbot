<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitreflam SAV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style>
        .typing-dot { animation: typing 1.4s ease-in-out infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-enter { animation: fadeIn 0.3s ease-out; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
</head>
<body class="font-sans bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg flex flex-col h-[600px] bg-white rounded-2xl shadow-lg overflow-hidden">

        <!-- Header -->
        <div class="bg-white px-5 py-4 border-b border-gray-200 flex items-center gap-3">
            <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center">
                <span class="text-white font-bold text-sm">O</span>
            </div>
            <div class="flex-1">
                <div class="font-semibold text-gray-900">Oliver</div>
                <div class="text-xs text-gray-500 flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                    <span id="onlineText">Online</span>
                </div>
            </div>
            <img src="https://www.indixit.com/wp-content/uploads/2016/04/logo-vitreflam.png" alt="Vitreflam" class="h-7 opacity-70">
        </div>

        <!-- Email -->
        <div class="px-5 py-3 bg-gray-50 border-b border-gray-200">
            <label class="block text-xs font-medium text-gray-500 mb-1" id="emailLabel">YOUR EMAIL</label>
            <input type="email" id="email" placeholder="example@email.com"
                class="w-full px-3 py-2 text-sm bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent">
            <p class="text-xs text-red-500 mt-1 hidden" id="emailError">Invalid email</p>
        </div>

        <!-- Messages -->
        <div id="messages" class="flex-1 overflow-y-auto px-5 py-4 space-y-4 bg-gray-50">

            <!-- Welcome message with language selection -->
            <div class="flex gap-2.5 msg-enter">
                <div class="w-7 h-7 bg-red-600 rounded-full flex-shrink-0 flex items-center justify-center mt-0.5">
                    <span class="text-white font-bold text-[10px]">O</span>
                </div>
                <div class="flex-1">
                    <div class="bg-white px-4 py-3 rounded-2xl rounded-tl-sm shadow-sm inline-block max-w-[85%]">
                        <p class="text-sm font-medium text-gray-800 mb-2">Hello! Welcome to Vitreflam</p>
                        <p class="text-xs text-gray-500 mb-3">Please select your language:</p>
                        <div id="langSelector" class="flex flex-wrap gap-2 justify-center">
                            <button onclick="selectLanguage('fr')" class="lang-btn text-2xl hover:scale-110 transition-transform p-1.5 rounded-lg hover:bg-gray-100" title="Francais">🇫🇷</button>
                            <button onclick="selectLanguage('en')" class="lang-btn text-2xl hover:scale-110 transition-transform p-1.5 rounded-lg hover:bg-gray-100" title="English">🇬🇧</button>
                            <button onclick="selectLanguage('it')" class="lang-btn text-2xl hover:scale-110 transition-transform p-1.5 rounded-lg hover:bg-gray-100" title="Italiano">🇮🇹</button>
                            <button onclick="selectLanguage('es')" class="lang-btn text-2xl hover:scale-110 transition-transform p-1.5 rounded-lg hover:bg-gray-100" title="Espanol">🇪🇸</button>
                            <button onclick="selectLanguage('de')" class="lang-btn text-2xl hover:scale-110 transition-transform p-1.5 rounded-lg hover:bg-gray-100" title="Deutsch">🇩🇪</button>
                            <button onclick="selectLanguage('zh')" class="lang-btn text-2xl hover:scale-110 transition-transform p-1.5 rounded-lg hover:bg-gray-100" title="Chinese">🇨🇳</button>
                        </div>
                    </div>
                    <div class="text-[10px] text-gray-400 mt-1 ml-1" id="welcomeTime"></div>
                </div>
            </div>

            <!-- Typing indicator -->
            <div id="typing" class="hidden flex gap-2.5">
                <div class="w-7 h-7 bg-red-600 rounded-full flex-shrink-0 flex items-center justify-center mt-0.5">
                    <span class="text-white font-bold text-[10px]">O</span>
                </div>
                <div class="bg-white px-4 py-3 rounded-2xl rounded-tl-sm shadow-sm inline-flex gap-1.5 items-center">
                    <span class="typing-dot w-1.5 h-1.5 bg-gray-400 rounded-full"></span>
                    <span class="typing-dot w-1.5 h-1.5 bg-gray-400 rounded-full"></span>
                    <span class="typing-dot w-1.5 h-1.5 bg-gray-400 rounded-full"></span>
                </div>
            </div>
        </div>

        <!-- Image Preview -->
        <div id="imagePreviewArea" class="hidden px-5 py-2 bg-white border-t border-gray-200">
            <div class="flex items-center gap-3 bg-gray-50 rounded-lg p-2">
                <div class="relative">
                    <img id="imagePreview" src="" alt="Preview" class="h-12 w-auto rounded-lg">
                    <button onclick="removeImage()" class="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center hover:bg-red-600">&times;</button>
                </div>
                <div class="text-xs text-gray-500">
                    <div class="font-medium text-gray-700" id="imageReadyText">Image ready</div>
                    <div id="imageName" class="truncate max-w-[150px]"></div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="px-4 py-3 bg-white border-t border-gray-200">
            <div class="flex gap-2 items-end">
                <label class="text-gray-400 hover:text-gray-600 cursor-pointer p-2 rounded-lg hover:bg-gray-100 transition-colors flex-shrink-0">
                    <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleImageSelect(event)">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                </label>
                <textarea id="messageInput"
                    placeholder="Write a message..."
                    rows="1"
                    onkeydown="handleKey(event)"
                    class="flex-1 px-3 py-2 text-sm bg-gray-100 rounded-xl resize-none focus:outline-none focus:ring-2 focus:ring-red-500 focus:bg-white border border-transparent focus:border-transparent max-h-24"></textarea>
                <button id="sendBtn" onclick="send()"
                    class="bg-red-600 text-white p-2.5 rounded-xl hover:bg-red-700 transition-colors disabled:opacity-40 flex-shrink-0">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14m-7-7l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </div>

    </div>

    <!-- Hidden API config -->
    <input type="hidden" id="webhookUrl" value="/api/chat">

    <script>
        const translations = {
            fr: {
                subtitle: "Oliver, votre conseiller virtuel",
                online: "En ligne",
                emailLabel: "VOTRE EMAIL",
                emailError: "Email invalide",
                emailPlaceholder: "exemple@email.com",
                placeholder: "Ecrivez un message...",
                imageReady: "Image prete",
                welcome: "Merci ! Comment puis-je vous aider aujourd'hui ?",
                photoSent: "(Photo envoyee)",
                photoMessage: "Voici ma photo",
                error: "Erreur de connexion. Contactez contactglassgroup@gmail.com",
                header: "SERVICE APRES-VENTE"
            },
            en: {
                subtitle: "Oliver, your virtual advisor",
                online: "Online",
                emailLabel: "YOUR EMAIL",
                emailError: "Invalid email",
                emailPlaceholder: "example@email.com",
                placeholder: "Write a message...",
                imageReady: "Image ready",
                welcome: "Thank you! How can I help you today?",
                photoSent: "(Photo sent)",
                photoMessage: "Here is my photo",
                error: "Connection error. Contact contactglassgroup@gmail.com",
                header: "AFTER-SALES SERVICE"
            },
            it: {
                subtitle: "Oliver, il tuo consulente virtuale",
                online: "Online",
                emailLabel: "LA TUA EMAIL",
                emailError: "Email non valida",
                emailPlaceholder: "esempio@email.com",
                placeholder: "Scrivi un messaggio...",
                imageReady: "Immagine pronta",
                welcome: "Grazie! Come posso aiutarti oggi?",
                photoSent: "(Foto inviata)",
                photoMessage: "Ecco la mia foto",
                error: "Errore di connessione. Contatta contactglassgroup@gmail.com",
                header: "SERVIZIO POST-VENDITA"
            },
            es: {
                subtitle: "Oliver, tu asesor virtual",
                online: "En linea",
                emailLabel: "TU EMAIL",
                emailError: "Email invalido",
                emailPlaceholder: "ejemplo@email.com",
                placeholder: "Escribe un mensaje...",
                imageReady: "Imagen lista",
                welcome: "Gracias! Como puedo ayudarte hoy?",
                photoSent: "(Foto enviada)",
                photoMessage: "Aqui esta mi foto",
                error: "Error de conexion. Contacta contactglassgroup@gmail.com",
                header: "SERVICIO POSTVENTA"
            },
            de: {
                subtitle: "Oliver, Ihr virtueller Berater",
                online: "Online",
                emailLabel: "IHRE EMAIL",
                emailError: "Ungultige Email",
                emailPlaceholder: "beispiel@email.com",
                placeholder: "Nachricht schreiben...",
                imageReady: "Bild bereit",
                welcome: "Danke! Wie kann ich Ihnen heute helfen?",
                photoSent: "(Foto gesendet)",
                photoMessage: "Hier ist mein Foto",
                error: "Verbindungsfehler. Kontaktieren Sie contactglassgroup@gmail.com",
                header: "KUNDENDIENST"
            },
            zh: {
                subtitle: "Oliver, 您的虚拟顾问",
                online: "在线",
                emailLabel: "您的邮箱",
                emailError: "邮箱无效",
                emailPlaceholder: "example@email.com",
                placeholder: "输入消息...",
                imageReady: "图片已准备",
                welcome: "谢谢! 今天我能为您做什么?",
                photoSent: "(照片已发送)",
                photoMessage: "这是我的照片",
                error: "连接错误。请联系 contactglassgroup@gmail.com",
                header: "售后服务"
            }
        };

        let sessionId = null;
        let conversationHistory = [];
        let currentImageBase64 = null;
        let currentImageType = null;
        let selectedLang = null;
        let languageSelected = false;

        const messages = document.getElementById('messages');
        const input = document.getElementById('messageInput');
        const btn = document.getElementById('sendBtn');
        const typing = document.getElementById('typing');
        const webhook = document.getElementById('webhookUrl');
        const emailInput = document.getElementById('email');
        const emailError = document.getElementById('emailError');
        const imageInput = document.getElementById('imageInput');
        const imagePreviewArea = document.getElementById('imagePreviewArea');
        const imagePreview = document.getElementById('imagePreview');
        const imageName = document.getElementById('imageName');

        document.getElementById('welcomeTime').textContent = time();

        // Auto-resize textarea
        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 96) + 'px';
        });

        function time() {
            return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        }

        function selectLanguage(lang) {
            selectedLang = lang;
            languageSelected = true;

            const t = translations[lang];
            document.getElementById('onlineText').textContent = t.online;
            document.getElementById('emailLabel').textContent = t.emailLabel;
            document.getElementById('emailError').textContent = t.emailError;
            emailInput.placeholder = t.emailPlaceholder;
            input.placeholder = t.placeholder;
            document.getElementById('imageReadyText').textContent = t.imageReady;

            const flags = { fr: '🇫🇷', en: '🇬🇧', it: '🇮🇹', es: '🇪🇸', de: '🇩🇪', zh: '🇨🇳' };
            document.getElementById('langSelector').innerHTML =
                '<span class="text-xl">' + flags[lang] + '</span>' +
                '<span class="ml-2 text-sm text-green-600 font-medium">&#10003;</span>';

            addMsg(t.welcome, false);
            localStorage.setItem('vitreflam_lang', lang);
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        }

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) {
                alert('Image too large (max 5MB)');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                const base64 = e.target.result;
                currentImageBase64 = base64.split(',')[1];
                currentImageType = file.type;
                imagePreview.src = base64;
                imageName.textContent = file.name;
                imagePreviewArea.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function removeImage() {
            currentImageBase64 = null;
            currentImageType = null;
            imageInput.value = '';
            imagePreviewArea.classList.add('hidden');
        }

        function addMsg(text, isUser, imageUrl = null) {
            conversationHistory.push({ role: isUser ? 'user' : 'assistant', content: text });

            const div = document.createElement('div');
            div.className = `flex gap-2.5 msg-enter ${isUser ? 'flex-row-reverse' : ''}`;

            const content = isUser ? escapeHtml(text) : parseMarkdown(text);
            const bubbleCls = isUser
                ? 'bg-red-600 text-white rounded-2xl rounded-tr-sm'
                : 'bg-white text-gray-800 rounded-2xl rounded-tl-sm shadow-sm';

            let imageHtml = '';
            if (imageUrl) {
                imageHtml = `<img src="${imageUrl}" alt="Image" class="mt-2 max-h-28 rounded-lg">`;
            }

            div.innerHTML = `
                ${isUser ? '' : `
                <div class="w-7 h-7 bg-red-600 rounded-full flex-shrink-0 flex items-center justify-center mt-0.5">
                    <span class="text-white font-bold text-[10px]">O</span>
                </div>`}
                <div class="flex-1 ${isUser ? 'text-right' : ''}">
                    <div class="${bubbleCls} px-4 py-2.5 inline-block max-w-[85%] text-left text-sm leading-relaxed">
                        ${content}
                        ${imageHtml}
                    </div>
                    <div class="text-[10px] text-gray-400 mt-1 ${isUser ? 'mr-1' : 'ml-1'}">${time()}</div>
                </div>
            `;

            messages.insertBefore(div, typing);
            messages.scrollTop = messages.scrollHeight;
        }

        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        function parseMarkdown(text) {
            text = text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" class="text-red-600 underline hover:text-red-700">$1</a>');
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
            text = text.replace(/\n/g, '<br>');
            text = text.replace(/^- (.+)/gm, '<span class="block ml-2">&#8226; $1</span>');
            return text;
        }

        async function send() {
            if (!languageSelected) {
                alert('Please select your language first / Veuillez d\'abord selectionner votre langue');
                return;
            }

            const t = translations[selectedLang];
            const msg = input.value.trim();
            const email = emailInput.value.trim();
            const url = webhook.value.trim();

            if (!email || !validateEmail(email)) {
                emailError.classList.remove('hidden');
                emailInput.focus();
                return;
            }
            emailError.classList.add('hidden');

            if (!msg && !currentImageBase64) return;

            const displayMsg = msg || t.photoSent;
            const imageDataUrl = currentImageBase64 ? `data:${currentImageType};base64,${currentImageBase64}` : null;
            addMsg(displayMsg, true, imageDataUrl);

            input.value = '';
            input.style.height = 'auto';
            btn.disabled = true;
            typing.classList.remove('hidden');
            messages.scrollTop = messages.scrollHeight;

            try {
                const payload = {
                    email,
                    message: msg || t.photoMessage,
                    session_id: sessionId,
                    conversation_history: conversationHistory,
                    language: selectedLang
                };

                if (currentImageBase64) {
                    payload.image_base64 = currentImageBase64;
                    payload.image_type = currentImageType;
                }

                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error(`Error ${res.status}`);

                const data = await res.json();
                if (data.session_id) sessionId = data.session_id;

                typing.classList.add('hidden');
                addMsg(data.response || 'Response received', false);

                removeImage();

            } catch (err) {
                typing.classList.add('hidden');
                addMsg(t.error, false);
            }

            btn.disabled = false;
        }

        // Restore email
        const savedEmail = localStorage.getItem('vitreflam_email');
        if (savedEmail) emailInput.value = savedEmail;
        emailInput.addEventListener('change', () => localStorage.setItem('vitreflam_email', emailInput.value));
    </script>

</body>
</html>
