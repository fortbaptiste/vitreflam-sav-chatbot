<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitreflam SAV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brutal-red': '#DC2626',
                        'brutal-red-dark': '#991B1B',
                        'brutal-black': '#0A0A0A',
                        'brutal-white': '#FAFAFA',
                        'brutal-cream': '#FEF3C7',
                        'brutal-yellow': '#FCD34D',
                    },
                    fontFamily: {
                        'brutal': ['Space Grotesk', 'sans-serif'],
                        'mono': ['Space Mono', 'monospace'],
                    },
                    boxShadow: {
                        'brutal': '8px 8px 0px 0px #0A0A0A',
                        'brutal-lg': '12px 12px 0px 0px #0A0A0A',
                        'brutal-xl': '16px 16px 0px 0px #0A0A0A',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delay': 'float 6s ease-in-out infinite 2s',
                        'bounce-brutal': 'bounce-brutal 1.4s ease-in-out infinite',
                        'slide-up': 'slide-up 0.4s ease-out',
                    },
                    keyframes: {
                        'float': {
                            '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(3deg)' },
                        },
                        'bounce-brutal': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-8px)' },
                        },
                        'slide-up': {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                },
            },
        }
    </script>
    <style>
        .brutal-border { border: 4px solid #0A0A0A; }
        .brutal-border-thick { border: 6px solid #0A0A0A; }

        .hover-brutal { transition: all 0.15s ease; }
        .hover-brutal:hover { transform: translate(-4px, -4px); box-shadow: 12px 12px 0px 0px #0A0A0A; }
        .hover-brutal:active { transform: translate(0, 0); box-shadow: 4px 4px 0px 0px #0A0A0A; }

        .pattern-grid {
            background-image: linear-gradient(#0A0A0A 1px, transparent 1px), linear-gradient(90deg, #0A0A0A 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .typing-dot { animation: bounce-brutal 1.4s ease-in-out infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        .message-enter { animation: slide-up 0.4s ease-out; }

        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #FEF3C7; border-left: 3px solid #0A0A0A; }
        ::-webkit-scrollbar-thumb { background: #DC2626; border: 3px solid #0A0A0A; }
        ::-webkit-scrollbar-thumb:hover { background: #991B1B; }

        .image-preview-container { position: relative; display: inline-block; }
        .image-preview-remove {
            position: absolute; top: -8px; right: -8px;
            width: 24px; height: 24px;
            background: #DC2626; color: white;
            border: 2px solid #0A0A0A;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px;
        }

        .lang-btn {
            transition: all 0.15s ease;
            font-size: 2rem;
        }
        .lang-btn:hover {
            transform: scale(1.2) translateY(-4px);
        }
        .lang-btn.selected {
            transform: scale(1.1);
            box-shadow: 0 0 0 4px #DC2626;
        }
    </style>
</head>
<body class="font-brutal bg-brutal-red min-h-screen overflow-x-hidden">

    <!-- HERO WITH CHATBOT -->
    <main class="relative min-h-screen flex flex-col">

        <!-- Background Elements -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <div class="absolute top-10 left-10 w-24 h-24 bg-brutal-yellow brutal-border rotate-12 animate-float opacity-70"></div>
            <div class="absolute top-20 right-16 w-16 h-16 bg-brutal-white brutal-border -rotate-6 animate-float-delay opacity-80"></div>
            <div class="absolute bottom-32 left-20 w-20 h-20 bg-brutal-black rounded-full animate-float opacity-50"></div>
            <div class="absolute bottom-20 right-24 w-28 h-28 bg-brutal-yellow brutal-border rounded-full animate-float-delay opacity-60"></div>
            <div class="absolute inset-0 pattern-grid opacity-5"></div>
        </div>

        <!-- Header -->
        <header class="relative z-50 p-4 md:p-6">
            <div class="flex items-center justify-between max-w-5xl mx-auto">
                <div class="bg-brutal-white brutal-border p-2 md:p-3 shadow-brutal hover-brutal">
                    <img src="https://www.indixit.com/wp-content/uploads/2016/04/logo-vitreflam.png" alt="Vitreflam" class="h-8 md:h-10">
                </div>
                <div class="bg-brutal-black text-brutal-white brutal-border px-4 py-2 md:px-6 md:py-3 shadow-brutal">
                    <span class="font-bold text-sm md:text-base tracking-wider">AFTER-SALES SERVICE</span>
                </div>
            </div>
        </header>

        <!-- Chat Container -->
        <div class="relative z-10 flex-1 flex items-center justify-center p-4 md:p-6">
            <div class="w-full max-w-2xl">

                <!-- Title -->
                <div class="text-center mb-6">
                    <h1 class="text-4xl md:text-6xl font-black text-brutal-white mb-2" style="-webkit-text-stroke: 2px #0A0A0A;">
                        VITREFLAM SAV
                    </h1>
                    <p class="text-brutal-cream font-medium text-lg" id="subtitleText">Oliver, your virtual advisor</p>
                </div>

                <!-- Chat Box -->
                <div class="bg-brutal-white brutal-border-thick shadow-brutal-xl">

                    <!-- Chat Header -->
                    <div class="bg-brutal-black p-4 flex items-center gap-4">
                        <div class="w-12 h-12 bg-brutal-red brutal-border flex items-center justify-center">
                            <span class="text-xl font-black text-brutal-white">O</span>
                        </div>
                        <div class="flex-1">
                            <div class="font-black text-brutal-white text-lg">OLIVER</div>
                            <div class="font-mono text-brutal-yellow text-sm flex items-center gap-2">
                                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                                <span id="onlineText">Online</span>
                            </div>
                        </div>
                    </div>

                    <!-- Email Field -->
                    <div class="bg-brutal-cream p-4 brutal-border-b border-brutal-black">
                        <label class="block font-bold text-sm mb-2 font-mono" id="emailLabel">YOUR EMAIL</label>
                        <input type="email" id="email" placeholder="example@email.com"
                            class="w-full p-3 brutal-border bg-brutal-white font-medium focus:outline-none focus:ring-4 focus:ring-brutal-red">
                        <p class="text-xs font-mono mt-2 text-brutal-red hidden" id="emailError">Invalid email</p>
                    </div>

                    <!-- Quick Actions (hidden until language selected) -->
                    <div id="quickActions" class="hidden p-3 brutal-border-b border-brutal-black flex flex-wrap gap-2">
                        <button onclick="sendQuick(translations[selectedLang].quickDelivery)" class="bg-brutal-red text-brutal-white brutal-border px-3 py-2 font-bold text-xs hover-brutal shadow-brutal" id="btnDelivery">DELIVERY DAMAGE</button>
                        <button onclick="sendQuick(translations[selectedLang].quickInstall)" class="bg-brutal-yellow text-brutal-black brutal-border px-3 py-2 font-bold text-xs hover-brutal shadow-brutal" id="btnInstall">INSTALLATION DAMAGE</button>
                        <button onclick="sendQuick(translations[selectedLang].quickTracking)" class="bg-brutal-black text-brutal-white brutal-border px-3 py-2 font-bold text-xs hover-brutal shadow-brutal" id="btnTracking">TRACKING</button>
                    </div>

                    <!-- Messages Area -->
                    <div id="messages" class="h-72 md:h-80 overflow-y-auto p-4 space-y-4 bg-brutal-cream">
                        <!-- Welcome message with language selection -->
                        <div class="flex gap-3 message-enter">
                            <div class="w-8 h-8 bg-brutal-red brutal-border flex-shrink-0 flex items-center justify-center">
                                <span class="font-bold text-brutal-white text-xs">O</span>
                            </div>
                            <div class="flex-1">
                                <div class="bg-brutal-white brutal-border p-4 shadow-brutal inline-block max-w-[90%]">
                                    <p class="font-bold text-lg mb-3">Hello! Welcome to Vitreflam SAV</p>
                                    <p class="text-sm mb-4">Please select your language:</p>

                                    <!-- Language Flags -->
                                    <div id="langSelector" class="flex flex-wrap gap-3 justify-center">
                                        <button onclick="selectLanguage('fr')" class="lang-btn brutal-border bg-brutal-cream p-2 hover-brutal" title="Francais">
                                            🇫🇷
                                        </button>
                                        <button onclick="selectLanguage('en')" class="lang-btn brutal-border bg-brutal-cream p-2 hover-brutal" title="English">
                                            🇬🇧
                                        </button>
                                        <button onclick="selectLanguage('it')" class="lang-btn brutal-border bg-brutal-cream p-2 hover-brutal" title="Italiano">
                                            🇮🇹
                                        </button>
                                        <button onclick="selectLanguage('es')" class="lang-btn brutal-border bg-brutal-cream p-2 hover-brutal" title="Espanol">
                                            🇪🇸
                                        </button>
                                        <button onclick="selectLanguage('de')" class="lang-btn brutal-border bg-brutal-cream p-2 hover-brutal" title="Deutsch">
                                            🇩🇪
                                        </button>
                                        <button onclick="selectLanguage('zh')" class="lang-btn brutal-border bg-brutal-cream p-2 hover-brutal" title="Chinese">
                                            🇨🇳
                                        </button>
                                    </div>
                                </div>
                                <div class="text-xs font-mono mt-1 opacity-60" id="welcomeTime"></div>
                            </div>
                        </div>

                        <!-- Typing indicator -->
                        <div id="typing" class="hidden flex gap-3">
                            <div class="w-8 h-8 bg-brutal-red brutal-border flex-shrink-0 flex items-center justify-center">
                                <span class="font-bold text-brutal-white text-xs">O</span>
                            </div>
                            <div class="bg-brutal-white brutal-border p-3 shadow-brutal inline-flex gap-2 items-center">
                                <span class="typing-dot w-2 h-2 bg-brutal-red rounded-full"></span>
                                <span class="typing-dot w-2 h-2 bg-brutal-red rounded-full"></span>
                                <span class="typing-dot w-2 h-2 bg-brutal-red rounded-full"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Image Preview -->
                    <div id="imagePreviewArea" class="hidden p-3 bg-brutal-yellow brutal-border-t border-brutal-black">
                        <div class="flex items-center gap-3">
                            <div class="image-preview-container">
                                <img id="imagePreview" src="" alt="Preview" class="h-16 w-auto brutal-border">
                                <button onclick="removeImage()" class="image-preview-remove">&times;</button>
                            </div>
                            <div class="text-sm font-mono">
                                <div class="font-bold" id="imageReadyText">Image ready</div>
                                <div id="imageName" class="text-xs opacity-70"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Input Area -->
                    <div class="bg-brutal-white p-4 brutal-border-t border-brutal-black">
                        <div class="flex gap-2 items-end">
                            <!-- Image Upload Button -->
                            <label class="bg-brutal-yellow brutal-border p-3 cursor-pointer hover-brutal shadow-brutal flex-shrink-0">
                                <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleImageSelect(event)">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                            </label>

                            <!-- Text Input -->
                            <textarea id="messageInput"
                                placeholder="Describe your problem..."
                                rows="1"
                                onkeydown="handleKey(event)"
                                class="flex-1 p-3 brutal-border bg-brutal-cream font-medium resize-none focus:outline-none focus:ring-4 focus:ring-brutal-red text-sm"></textarea>

                            <!-- Send Button -->
                            <button id="sendBtn" onclick="send()"
                                class="bg-brutal-red text-brutal-white brutal-border px-6 py-3 font-black tracking-wider hover-brutal shadow-brutal disabled:opacity-50 text-sm">
                                SEND
                            </button>
                        </div>
                    </div>

                </div>

                <!-- API Config (dev) - hidden in production -->
                <div class="mt-4 bg-brutal-black brutal-border p-3 shadow-brutal hidden">
                    <div class="flex gap-2 items-center">
                        <span class="font-mono text-brutal-yellow text-xs">API:</span>
                        <input type="text" id="webhookUrl" value="/api/chat"
                            class="flex-1 p-2 brutal-border bg-brutal-white font-mono text-xs focus:outline-none">
                        <div id="status" class="px-3 py-1 brutal-border bg-brutal-yellow font-mono text-xs">Waiting</div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Footer -->
        <footer class="relative z-10 p-4 text-center">
            <p class="text-brutal-cream font-mono text-sm">
                Contact : <strong class="text-brutal-white">contactglassgroup@gmail.com</strong>
            </p>
        </footer>

    </main>

    <script>
        // Translations
        const translations = {
            fr: {
                subtitle: "Oliver, votre conseiller virtuel",
                online: "En ligne",
                emailLabel: "VOTRE EMAIL",
                emailError: "Email invalide",
                emailPlaceholder: "exemple@email.com",
                placeholder: "Decrivez votre probleme...",
                send: "ENVOYER",
                btnDelivery: "CASSE LIVRAISON",
                btnInstall: "CASSE MONTAGE",
                btnTracking: "SUIVI",
                quickDelivery: "Ma vitre est arrivee cassee",
                quickInstall: "J'ai casse ma vitre au montage",
                quickTracking: "Ou en est ma commande ?",
                imageReady: "Image prete",
                welcome: "Merci ! Comment puis-je vous aider aujourd'hui ?",
                photoSent: "(Photo envoyee)",
                photoMessage: "Voici ma photo",
                error: "Erreur de connexion. Contactez contactglassgroup@gmail.com",
                header: "SERVICE APRES-VENTE"
            },
            en: {
                subtitle: "Oliver, your virtual advisor",
                online: "Online",
                emailLabel: "YOUR EMAIL",
                emailError: "Invalid email",
                emailPlaceholder: "example@email.com",
                placeholder: "Describe your problem...",
                send: "SEND",
                btnDelivery: "DELIVERY DAMAGE",
                btnInstall: "INSTALLATION DAMAGE",
                btnTracking: "TRACKING",
                quickDelivery: "My glass arrived broken",
                quickInstall: "I broke my glass during installation",
                quickTracking: "Where is my order?",
                imageReady: "Image ready",
                welcome: "Thank you! How can I help you today?",
                photoSent: "(Photo sent)",
                photoMessage: "Here is my photo",
                error: "Connection error. Contact contactglassgroup@gmail.com",
                header: "AFTER-SALES SERVICE"
            },
            it: {
                subtitle: "Oliver, il tuo consulente virtuale",
                online: "Online",
                emailLabel: "LA TUA EMAIL",
                emailError: "Email non valida",
                emailPlaceholder: "esempio@email.com",
                placeholder: "Descrivi il tuo problema...",
                send: "INVIA",
                btnDelivery: "DANNO CONSEGNA",
                btnInstall: "DANNO MONTAGGIO",
                btnTracking: "TRACCIAMENTO",
                quickDelivery: "Il mio vetro e arrivato rotto",
                quickInstall: "Ho rotto il vetro durante il montaggio",
                quickTracking: "Dov'e il mio ordine?",
                imageReady: "Immagine pronta",
                welcome: "Grazie! Come posso aiutarti oggi?",
                photoSent: "(Foto inviata)",
                photoMessage: "Ecco la mia foto",
                error: "Errore di connessione. Contatta contactglassgroup@gmail.com",
                header: "SERVIZIO POST-VENDITA"
            },
            es: {
                subtitle: "Oliver, tu asesor virtual",
                online: "En linea",
                emailLabel: "TU EMAIL",
                emailError: "Email invalido",
                emailPlaceholder: "ejemplo@email.com",
                placeholder: "Describe tu problema...",
                send: "ENVIAR",
                btnDelivery: "DANO ENTREGA",
                btnInstall: "DANO MONTAJE",
                btnTracking: "SEGUIMIENTO",
                quickDelivery: "Mi cristal llego roto",
                quickInstall: "Rompi el cristal durante el montaje",
                quickTracking: "Donde esta mi pedido?",
                imageReady: "Imagen lista",
                welcome: "Gracias! Como puedo ayudarte hoy?",
                photoSent: "(Foto enviada)",
                photoMessage: "Aqui esta mi foto",
                error: "Error de conexion. Contacta contactglassgroup@gmail.com",
                header: "SERVICIO POSTVENTA"
            },
            de: {
                subtitle: "Oliver, Ihr virtueller Berater",
                online: "Online",
                emailLabel: "IHRE EMAIL",
                emailError: "Ungultige Email",
                emailPlaceholder: "beispiel@email.com",
                placeholder: "Beschreiben Sie Ihr Problem...",
                send: "SENDEN",
                btnDelivery: "LIEFERSCHADEN",
                btnInstall: "MONTAGESCHADEN",
                btnTracking: "VERFOLGUNG",
                quickDelivery: "Mein Glas kam zerbrochen an",
                quickInstall: "Ich habe das Glas bei der Montage zerbrochen",
                quickTracking: "Wo ist meine Bestellung?",
                imageReady: "Bild bereit",
                welcome: "Danke! Wie kann ich Ihnen heute helfen?",
                photoSent: "(Foto gesendet)",
                photoMessage: "Hier ist mein Foto",
                error: "Verbindungsfehler. Kontaktieren Sie contactglassgroup@gmail.com",
                header: "KUNDENDIENST"
            },
            zh: {
                subtitle: "Oliver, 您的虚拟顾问",
                online: "在线",
                emailLabel: "您的邮箱",
                emailError: "邮箱无效",
                emailPlaceholder: "example@email.com",
                placeholder: "描述您的问题...",
                send: "发送",
                btnDelivery: "运输损坏",
                btnInstall: "安装损坏",
                btnTracking: "订单追踪",
                quickDelivery: "我的玻璃到货时已破损",
                quickInstall: "我在安装时打碎了玻璃",
                quickTracking: "我的订单在哪里?",
                imageReady: "图片已准备",
                welcome: "谢谢! 今天我能为您做什么?",
                photoSent: "(照片已发送)",
                photoMessage: "这是我的照片",
                error: "连接错误。请联系 contactglassgroup@gmail.com",
                header: "售后服务"
            }
        };

        let sessionId = null;
        let conversationHistory = [];
        let currentImageBase64 = null;
        let currentImageType = null;
        let selectedLang = null;
        let languageSelected = false;

        const messages = document.getElementById('messages');
        const input = document.getElementById('messageInput');
        const btn = document.getElementById('sendBtn');
        const typing = document.getElementById('typing');
        const webhook = document.getElementById('webhookUrl');
        const status = document.getElementById('status');
        const emailInput = document.getElementById('email');
        const emailError = document.getElementById('emailError');
        const imageInput = document.getElementById('imageInput');
        const imagePreviewArea = document.getElementById('imagePreviewArea');
        const imagePreview = document.getElementById('imagePreview');
        const imageName = document.getElementById('imageName');

        document.getElementById('welcomeTime').textContent = time();

        function time() {
            return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        }

        function selectLanguage(lang) {
            selectedLang = lang;
            languageSelected = true;

            // Update UI with selected language
            const t = translations[lang];
            document.getElementById('subtitleText').textContent = t.subtitle;
            document.getElementById('onlineText').textContent = t.online;
            document.getElementById('emailLabel').textContent = t.emailLabel;
            document.getElementById('emailError').textContent = t.emailError;
            emailInput.placeholder = t.emailPlaceholder;
            input.placeholder = t.placeholder;
            btn.textContent = t.send;
            document.getElementById('btnDelivery').textContent = t.btnDelivery;
            document.getElementById('btnInstall').textContent = t.btnInstall;
            document.getElementById('btnTracking').textContent = t.btnTracking;
            document.getElementById('imageReadyText').textContent = t.imageReady;

            // Show quick actions
            document.getElementById('quickActions').classList.remove('hidden');

            // Hide language selector
            document.getElementById('langSelector').innerHTML = '<span class="text-2xl">' + getFlagEmoji(lang) + '</span><span class="ml-2 font-bold text-brutal-red">Selected!</span>';

            // Add welcome message in selected language
            addMsg(t.welcome, false);

            // Save language preference
            localStorage.setItem('vitreflam_lang', lang);
        }

        function getFlagEmoji(lang) {
            const flags = { fr: '🇫🇷', en: '🇬🇧', it: '🇮🇹', es: '🇪🇸', de: '🇩🇪', zh: '🇨🇳' };
            return flags[lang] || '🌐';
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        }

        function sendQuick(text) {
            input.value = text;
            send();
        }

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // Image handling
        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) {
                alert('Image too large (max 5MB)');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const base64 = e.target.result;
                currentImageBase64 = base64.split(',')[1];
                currentImageType = file.type;

                imagePreview.src = base64;
                imageName.textContent = file.name;
                imagePreviewArea.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function removeImage() {
            currentImageBase64 = null;
            currentImageType = null;
            imageInput.value = '';
            imagePreviewArea.classList.add('hidden');
        }

        function addMsg(text, isUser, imageUrl = null) {
            conversationHistory.push({ role: isUser ? 'user' : 'assistant', content: text });

            const div = document.createElement('div');
            div.className = `flex gap-3 message-enter ${isUser ? 'flex-row-reverse' : ''}`;

            const content = isUser ? escapeHtml(text) : parseMarkdown(text);
            const avatarBg = isUser ? 'bg-brutal-black' : 'bg-brutal-red';
            const avatarText = isUser ? 'ME' : 'O';
            const msgBg = isUser ? 'bg-brutal-red text-brutal-white' : 'bg-brutal-white';

            let imageHtml = '';
            if (imageUrl) {
                imageHtml = `<img src="${imageUrl}" alt="Image" class="mt-2 max-h-32 brutal-border">`;
            }

            div.innerHTML = `
                <div class="w-8 h-8 ${avatarBg} brutal-border flex-shrink-0 flex items-center justify-center">
                    <span class="font-bold text-brutal-white text-xs">${avatarText}</span>
                </div>
                <div class="flex-1 ${isUser ? 'text-right' : ''}">
                    <div class="${msgBg} brutal-border p-3 shadow-brutal inline-block max-w-[90%] text-left text-sm">
                        ${content}
                        ${imageHtml}
                    </div>
                    <div class="text-xs font-mono mt-1 opacity-60">${time()}</div>
                </div>
            `;

            messages.insertBefore(div, typing);
            messages.scrollTop = messages.scrollHeight;
        }

        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        function parseMarkdown(text) {
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong class="text-brutal-red font-black">$1</strong>');
            text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
            text = text.replace(/\n/g, '<br>');
            text = text.replace(/^- (.+)/gm, '<span class="block ml-2">&#8226; $1</span>');
            return text;
        }

        function setStatus(type, text) {
            const colors = { waiting: 'bg-brutal-yellow', connected: 'bg-green-300', error: 'bg-brutal-red text-brutal-white' };
            status.className = `px-3 py-1 brutal-border font-mono text-xs ${colors[type] || 'bg-brutal-yellow'}`;
            status.textContent = text;
        }

        async function send() {
            if (!languageSelected) {
                alert('Please select your language first / Veuillez d\'abord selectionner votre langue');
                return;
            }

            const t = translations[selectedLang];
            const msg = input.value.trim();
            const email = emailInput.value.trim();
            const url = webhook.value.trim();

            if (!email || !validateEmail(email)) {
                emailError.classList.remove('hidden');
                emailInput.classList.add('ring-4', 'ring-brutal-red');
                emailInput.focus();
                return;
            }
            emailError.classList.add('hidden');
            emailInput.classList.remove('ring-4', 'ring-brutal-red');

            if (!msg && !currentImageBase64) return;
            if (!url) { setStatus('error', 'URL missing'); return; }

            // Display message with image if present
            const displayMsg = msg || t.photoSent;
            const imageDataUrl = currentImageBase64 ? `data:${currentImageType};base64,${currentImageBase64}` : null;
            addMsg(displayMsg, true, imageDataUrl);

            input.value = '';
            btn.disabled = true;
            typing.classList.remove('hidden');
            messages.scrollTop = messages.scrollHeight;

            try {
                const payload = {
                    email,
                    message: msg || t.photoMessage,
                    session_id: sessionId,
                    conversation_history: conversationHistory,
                    language: selectedLang
                };

                // Add image if present
                if (currentImageBase64) {
                    payload.image_base64 = currentImageBase64;
                    payload.image_type = currentImageType;
                }

                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error(`Error ${res.status}`);

                const data = await res.json();
                if (data.session_id) sessionId = data.session_id;

                typing.classList.add('hidden');
                addMsg(data.response || 'Response received', false);
                setStatus('connected', 'Connected');

                // Clear image after send
                removeImage();

            } catch (err) {
                typing.classList.add('hidden');
                addMsg(t.error, false);
                setStatus('error', err.message);
            }

            btn.disabled = false;
        }

        // Restore email and language
        const savedEmail = localStorage.getItem('vitreflam_email');
        if (savedEmail) emailInput.value = savedEmail;
        emailInput.addEventListener('change', () => localStorage.setItem('vitreflam_email', emailInput.value));

        const savedLang = localStorage.getItem('vitreflam_lang');
        if (savedLang && translations[savedLang]) {
            // Auto-select saved language but still show selector for new session
        }
    </script>

</body>
</html>
