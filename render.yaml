services:
  - type: web
    name: vitreflam-sav-chatbot
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r BACKEND/requirements.txt
    startCommand: cd BACKEND && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: COLISSIMO_API_KEY
        sync: false
